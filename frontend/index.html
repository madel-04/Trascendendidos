<!DOCTYPE html>
<!-- Declaración del tipo de documento HTML5 -->
<html lang="en">
  <!-- Idioma principal de la página (importante para SEO y accesibilidad) -->
  <head>
    <!-- ===== METADATOS ===== -->
    <!-- Charset: Codificación de caracteres (UTF-8 soporta todos los idiomas) -->
    <meta charset="UTF-8" />
    
    <!-- Viewport: Configuración para dispositivos móviles -->
    <!-- width=device-width: Ancho igual al del dispositivo -->
    <!-- initial-scale=1.0: Zoom inicial al 100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Título que aparece en la pestaña del navegador -->
    <title>Transcendence</title>
  </head>
  <body>
    <!-- ===== PUNTO DE MONTAJE DE REACT ===== -->
    <!-- Este div es donde React inyectará toda la aplicación -->
    <!-- El id="root" es usado en main.tsx con document.getElementById("root") -->
    <div id="root"></div>
    
    <!-- ===== SCRIPT DE ENTRADA ===== -->
    <!-- type="module": Indica que es un módulo ES6 (permite import/export) -->
    <!-- src="/src/main.tsx": Vite procesará este archivo TypeScript/React -->
    <!-- Vite transforma automáticamente .tsx a JavaScript válido -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
